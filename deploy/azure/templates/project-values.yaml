# Copy this file into:
# projects/<service>/deploy/azure/values.yaml

nameOverride: "<service-name>"
fullnameOverride: "<service-name>"

replicaCount: 1

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 0

image:
  repository: example.azurecr.io/<service-name>
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

containerPort: 8000

env:
  APP_ENV: "dev"
  LOG_LEVEL: "INFO"

secretEnv: []

ingress:
  enabled: false
  className: webapprouting.kubernetes.azure.com
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: <service-subdomain>.example.com
  path: /
  pathType: Prefix
  tls:
    enabled: true
    secretName: <service-name>-tls

keyVault:
  enabled: false
  name: ""
  tenantId: ""
  useVMManagedIdentity: true
  userAssignedIdentityID: ""
  mountPath: /mnt/secrets-store
  secrets: []
  # - objectName: openai-api-key
  #   secretKey: OPENAI_API_KEY

resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: 300m
    memory: 512Mi

livenessProbe:
  path: /health
  initialDelaySeconds: 20
  periodSeconds: 15

readinessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10
