{{- if .Values.keyVault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "fastapi-service.fullname" . }}-keyvault
spec:
  provider: azure
  {{- if .Values.keyVault.secrets }}
  secretObjects:
    - secretName: {{ include "fastapi-service.fullname" . }}-kv-secrets
      type: Opaque
      data:
        {{- range .Values.keyVault.secrets }}
        - objectName: {{ .objectName }}
          key: {{ .secretKey }}
        {{- end }}
  {{- end }}
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: {{ ternary "\"true\"" "\"false\"" .Values.keyVault.useVMManagedIdentity }}
    userAssignedIdentityID: {{ .Values.keyVault.userAssignedIdentityID | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    cloudName: ""
    objects: |
      array:
        {{- range .Values.keyVault.secrets }}
        - |
          objectName: {{ .objectName }}
          objectType: secret
        {{- end }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
{{- end }}
