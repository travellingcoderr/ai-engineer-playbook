services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_infra_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_network

  # MongoDB Document Store
  mongodb:
    image: mongo:latest
    container_name: ai_infra_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db
    networks:
      - ai_network

  # Redis Cache / Pub-Sub
  redis:
    image: redis:latest
    container_name: ai_infra_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai_network

  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_infra_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=saga_db
      - POSTGRES_USER=saga_user
      - POSTGRES_PASSWORD=saga_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_network

networks:
  ai_network:
    external: true

volumes:
  qdrant_data:
  mongo_data:
  redis_data:
  postgres_data:
