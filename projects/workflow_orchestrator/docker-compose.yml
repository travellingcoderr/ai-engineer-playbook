services:
  n8n:
    image: n8nio/n8n:latest
    container_name: ai_workflow_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - ai_network

volumes:
  n8n_data:

networks:
  ai_network:
    external: true
