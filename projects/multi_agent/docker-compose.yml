#version: '3.8'

services:
  multi_agent:
    build:
      context: ../../  # Context at root to access unified requirements and packages
      dockerfile: projects/multi_agent/Dockerfile
    ports:
      - "${MULTIAGENT_PORT:-8004}:${MULTIAGENT_PORT:-8004}"
    env_file:
      - ../../.env
    environment:
      - MULTIAGENT_PORT=${MULTIAGENT_PORT:-8004}
    volumes:
      # Mount the current directory for live hot-reloading
      - .:/app/projects/multi_agent
      # Mount the universally shared core packages
      - ../../packages:/app/packages
      # Expose the root .env so the shared config loader can still discover it at runtime.
      - ../../.env:/app/.env:ro
    networks:
      - multi_agent_network

networks:
  multi_agent_network:
    driver: bridge
