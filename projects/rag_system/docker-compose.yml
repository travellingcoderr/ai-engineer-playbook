#version: '3.8'

services:
  # The FastAPI RAG Application
  api:
    build:
      context: ../../  # Context is the ai-engineer-playbook root so we can access requirements.txt
      dockerfile: projects/rag_system/Dockerfile
    container_name: rag_api
    ports:
      - "${RAG_PORT:-8000}:${RAG_PORT:-8000}"
    env_file:
      - ../../.env  # Load API keys from the root .env file
    environment:
      - RAG_PORT=${RAG_PORT:-8000}
      - LLM_PROVIDER=openai
      - EMBEDDING_PROVIDER=openai
      - VECTOR_STORE_PROVIDER=qdrant
      # Wait for the DB to start
      - VECTOR_STORE_HOST=qdrant_db
      - VECTOR_STORE_PORT=6333
    depends_on:
      # - chroma_db
      - qdrant_db
    volumes:
      - ../../.env:/app/.env:ro
    networks:
      - ai_network

  # ChromaDB Server
  # chroma_db:
  #   image: chromadb/chroma:latest
  #   container_name: rag_chroma_db
  #   volumes:
  #     - chroma_data:/chroma/chroma
  #   ports:
  #     - "8001:8000" # Expose to host on 8001
  #   networks:
  #     - ai_network

  # Qdrant Server (Alternative Vector DB Example)
  qdrant_db:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant_db
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333" # Expose to host on 6333
    networks:
      - ai_network

volumes:
  chroma_data:
  qdrant_data:

networks:
  ai_network:
    external: true
