#version: '3.8'

services:
  # The FastAPI RAG Application
  api:
    build:
      context: ../../  # Context is the ai-engineer-playbook root so we can access requirements.txt
      dockerfile: projects/rag_system/Dockerfile
    container_name: rag_api
    ports:
      - "${RAG_PORT:-8000}:${RAG_PORT:-8000}"
    env_file:
      - ../../.env  # Load API keys from the root .env file
    environment:
      - RAG_PORT=${RAG_PORT:-8000}
      - LLM_PROVIDER=openai
      - EMBEDDING_PROVIDER=openai
      - VECTOR_STORE_PROVIDER=qdrant
      # Wait for the DB to start
      - VECTOR_STORE_HOST=ai_infra_qdrant
      - VECTOR_STORE_PORT=6333
    depends_on:
      # Use external qdrant starts with run-infra
      []
    volumes:
      - ../../.env:/app/.env:ro
    networks:
      - ai_network

# Qdrant is now managed in projects/infrastructure/docker-compose.yml
# Start it with 'make run-infra'

volumes:
  chroma_data:
  qdrant_data:

networks:
  ai_network:
    external: true
