version: '3.8'

services:
  nexus-api:
    image: nexus-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    # If we swap to a real DB, we'd add a dependency here:
    # depends_on:
    #   - nexus-db

