version: '3.8'

services:
  guardrails-api:
    build:
      context: ../../
      dockerfile: projects/guardrails/Dockerfile
    container_name: guardrails_api
    ports:
      - "${GUARD_PORT:-8005}:8005"
    environment:
      - GUARD_PORT=8005
    networks:
      - mcp_network

networks:
  mcp_network:
    driver: bridge
