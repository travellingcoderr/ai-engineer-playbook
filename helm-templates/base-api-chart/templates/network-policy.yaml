apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "k8s-api-service.fullname" . }}
  labels:
    {{- include "k8s-api-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "k8s-api-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {} # Allow from all pods in the namespace
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0 # Allow to all (for demo purposes)
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
