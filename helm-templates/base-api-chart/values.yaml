replicaCount: 2

image:
  repository: k8s-api-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: "api.example.com"
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: api-tls
      hosts:
        - api.example.com

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

env:
  APP_ENV_VAR: "Hello from Kubernetes ConfigMap!"

# -- Secrets configuration
secrets:
  APP_SECRET: "SSBoYXZlIGEgc2VjcmV0IDsp" # "I have a secret ;)" in base64

# -- ServiceAccount configuration
serviceAccount:
  create: true
  # -- name of the service account to use. If not set and create is true, a name is generated using the fullname template
  name: ""
  annotations: {}

# -- RBAC configuration
rbac:
  create: false
  # -- Rules for the Role (namespace-scoped)
  rules: []
  # - apiGroups: [""]
  #   resources: ["pods"]
  #   verbs: ["get", "list", "watch"]

# -- Jobs configuration (one-off tasks)
jobs: []
# - name: db-migration
#   image:
#     repository: migration-tool
#     tag: v1.0.0
#   command: ["/bin/sh", "-c", "echo migration logic here"]

# -- CronJobs configuration (scheduled tasks)
cronjobs: []
