# GitHub Secrets
# - AZURE_CLIENT_ID
# - AZURE_TENANT_ID
# - AZURE_SUBSCRIPTION_ID
#
# GitHub Variables
# - RESEARCH_AGENT_HOST
# - RESEARCH_AGENT_TLS_SECRET_NAME
# - RESEARCH_AGENT_RESOURCE_GROUP
# - RESEARCH_AGENT_LOCATION
# - RESEARCH_AGENT_ACR_NAME
# - RESEARCH_AGENT_AKS_NAME
# - RESEARCH_AGENT_AKS_NODE_COUNT
# - RESEARCH_AGENT_AKS_VM_SIZE
# - RESEARCH_AGENT_AKS_NAMESPACE
# - RESEARCH_AGENT_KEY_VAULT_NAME
# - TFSTATE_RESOURCE_GROUP
# - TFSTATE_STORAGE_ACCOUNT
# - TFSTATE_CONTAINER
# - TFSTATE_KEY
# - KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON
#
# Job order:
# 1. terraform-infra
# 2. acr-registry
# 3. docker-build
# 4. helm-deploy
#
# Note:
# Docker/ACR login does not persist across jobs. The registry job validates ACR access,
# and the build job logs in again before push.
#
name: research-agent-aks

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "projects/research_agent/**"
      - "deploy/helm/**"
      - "deploy/azure/terraform/modules/**"
      - ".github/workflows/research-agent-aks.yml"

env:
  IMAGE_NAME: research-agent
  HELM_RELEASE_NAME: research-agent
  TF_WORKING_DIR: projects/research_agent/deploy/azure/terraform
  AZURE_CORE_OUTPUT: none
  RESEARCH_AGENT_RESOURCE_GROUP: ${{ vars.RESEARCH_AGENT_RESOURCE_GROUP || 'rg-research-agent-dev' }}
  RESEARCH_AGENT_LOCATION: ${{ vars.RESEARCH_AGENT_LOCATION || 'eastus' }}
  RESEARCH_AGENT_ACR_NAME: ${{ vars.RESEARCH_AGENT_ACR_NAME || 'researchagentacrdev' }}
  RESEARCH_AGENT_AKS_NAME: ${{ vars.RESEARCH_AGENT_AKS_NAME || 'aks-research-agent-dev' }}
  RESEARCH_AGENT_AKS_NODE_COUNT: ${{ vars.RESEARCH_AGENT_AKS_NODE_COUNT || '1' }}
  RESEARCH_AGENT_AKS_VM_SIZE: ${{ vars.RESEARCH_AGENT_AKS_VM_SIZE || 'Standard_B2s' }}
  RESEARCH_AGENT_AKS_NAMESPACE: ${{ vars.RESEARCH_AGENT_AKS_NAMESPACE || 'research-agent-dev' }}
  RESEARCH_AGENT_KEY_VAULT_NAME: ${{ vars.RESEARCH_AGENT_KEY_VAULT_NAME || 'kv-research-agent-dev007' }}
  RESEARCH_AGENT_HOST: ${{ vars.RESEARCH_AGENT_HOST || 'research.purpletechllc.com' }}
  RESEARCH_AGENT_TLS_SECRET_NAME: ${{ vars.RESEARCH_AGENT_TLS_SECRET_NAME || 'research-agent-tls' }}
  TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP || 'rg-tfstate-shared-dev' }}
  TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
  TFSTATE_CONTAINER: ${{ vars.TFSTATE_CONTAINER || 'tfstate' }}
  TFSTATE_KEY: ${{ vars.TFSTATE_KEY || 'research-agent-dev.tfstate' }}
  KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON: ${{ vars.KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON || '[]' }}

jobs:
  terraform-infra:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      acr_login_server: ${{ steps.tf_outputs.outputs.acr_login_server }}
      aks_name: ${{ steps.tf_outputs.outputs.aks_name }}
      aks_namespace: ${{ steps.tf_outputs.outputs.aks_namespace }}
      resource_group_name: ${{ steps.tf_outputs.outputs.resource_group_name }}
      key_vault_name: ${{ steps.tf_outputs.outputs.key_vault_name }}
      aks_keyvault_csi_client_id: ${{ steps.tf_outputs.outputs.aks_keyvault_csi_client_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        run: |
          missing=0
          check_secret() {
            if [ -z "$2" ]; then
              echo "Missing secret: $1"
              missing=1
            else
              echo "Secret present: $1"
            fi
          }

          check_variable() {
            if [ -z "$2" ]; then
              echo "Missing variable: $1"
              missing=1
            else
              echo "Variable $1=$2"
            fi
          }

          check_secret "AZURE_CLIENT_ID" "${{ secrets.AZURE_CLIENT_ID }}"
          check_secret "AZURE_TENANT_ID" "${{ secrets.AZURE_TENANT_ID }}"
          check_secret "AZURE_SUBSCRIPTION_ID" "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

          check_variable "RESEARCH_AGENT_RESOURCE_GROUP" "${RESEARCH_AGENT_RESOURCE_GROUP}"
          check_variable "RESEARCH_AGENT_LOCATION" "${RESEARCH_AGENT_LOCATION}"
          check_variable "RESEARCH_AGENT_ACR_NAME" "${RESEARCH_AGENT_ACR_NAME}"
          check_variable "RESEARCH_AGENT_AKS_NAME" "${RESEARCH_AGENT_AKS_NAME}"
          check_variable "RESEARCH_AGENT_AKS_NODE_COUNT" "${RESEARCH_AGENT_AKS_NODE_COUNT}"
          check_variable "RESEARCH_AGENT_AKS_VM_SIZE" "${RESEARCH_AGENT_AKS_VM_SIZE}"
          check_variable "RESEARCH_AGENT_AKS_NAMESPACE" "${RESEARCH_AGENT_AKS_NAMESPACE}"
          check_variable "RESEARCH_AGENT_KEY_VAULT_NAME" "${RESEARCH_AGENT_KEY_VAULT_NAME}"
          check_variable "RESEARCH_AGENT_HOST" "${RESEARCH_AGENT_HOST}"
          check_variable "RESEARCH_AGENT_TLS_SECRET_NAME" "${RESEARCH_AGENT_TLS_SECRET_NAME}"
          check_variable "TFSTATE_RESOURCE_GROUP" "${TFSTATE_RESOURCE_GROUP}"
          check_variable "TFSTATE_STORAGE_ACCOUNT" "${TFSTATE_STORAGE_ACCOUNT}"
          check_variable "TFSTATE_CONTAINER" "${TFSTATE_CONTAINER}"
          check_variable "TFSTATE_KEY" "${TFSTATE_KEY}"
          check_variable "KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON" "${KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON}"

          if [ -z "${TFSTATE_STORAGE_ACCOUNT}" ]; then
            echo "TFSTATE_STORAGE_ACCOUNT GitHub variable is required."
            missing=1
          fi
          if [ -z "${RESEARCH_AGENT_ACR_NAME}" ]; then
            echo "RESEARCH_AGENT_ACR_NAME GitHub variable is required."
            missing=1
          fi
          if [ -z "${RESEARCH_AGENT_KEY_VAULT_NAME}" ]; then
            echo "RESEARCH_AGENT_KEY_VAULT_NAME GitHub variable is required."
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Bootstrap Terraform backend
        run: |
          az group create \
            --name "${TFSTATE_RESOURCE_GROUP}" \
            --location "${RESEARCH_AGENT_LOCATION}"

          az storage account create \
            --name "${TFSTATE_STORAGE_ACCOUNT}" \
            --resource-group "${TFSTATE_RESOURCE_GROUP}" \
            --location "${RESEARCH_AGENT_LOCATION}" \
            --sku Standard_LRS \
            --allow-blob-public-access false \
            --min-tls-version TLS1_2

          TFSTATE_ACCESS_KEY="$(az storage account keys list \
            --resource-group "${TFSTATE_RESOURCE_GROUP}" \
            --account-name "${TFSTATE_STORAGE_ACCOUNT}" \
            --query '[0].value' \
            --output tsv)"

          az storage container create \
            --name "${TFSTATE_CONTAINER}" \
            --account-name "${TFSTATE_STORAGE_ACCOUNT}" \
            --account-key "${TFSTATE_ACCESS_KEY}"

          echo "TFSTATE_ACCESS_KEY=${TFSTATE_ACCESS_KEY}" >> "${GITHUB_ENV}"

      - name: Write Terraform input file
        run: |
          cat > "${TF_WORKING_DIR}/github.auto.tfvars" <<EOF
          azure_subscription_id = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          resource_group_name   = "${RESEARCH_AGENT_RESOURCE_GROUP}"
          location              = "${RESEARCH_AGENT_LOCATION}"
          acr_name              = "${RESEARCH_AGENT_ACR_NAME}"
          aks_name              = "${RESEARCH_AGENT_AKS_NAME}"
          aks_node_count        = ${RESEARCH_AGENT_AKS_NODE_COUNT}
          aks_vm_size           = "${RESEARCH_AGENT_AKS_VM_SIZE}"
          aks_namespace         = "${RESEARCH_AGENT_AKS_NAMESPACE}"
          key_vault_name        = "${RESEARCH_AGENT_KEY_VAULT_NAME}"
          enable_app_routing    = true
          enable_keyvault_csi   = true
          github_actions_client_id               = "${{ secrets.AZURE_CLIENT_ID }}"
          enable_github_actions_role_assignments = true
          key_vault_secrets_officer_object_ids   = ${KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON}
          EOF

      - name: Terraform init
        run: |
          terraform -chdir="${TF_WORKING_DIR}" init -input=false \
            -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TFSTATE_CONTAINER}" \
            -backend-config="key=${TFSTATE_KEY}" \
            -backend-config="access_key=${TFSTATE_ACCESS_KEY}"

      - name: Terraform plan
        run: terraform -chdir="${TF_WORKING_DIR}" plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform -chdir="${TF_WORKING_DIR}" apply -input=false -auto-approve tfplan

      - name: Export Terraform outputs
        id: tf_outputs
        run: |
          echo "acr_login_server=$(terraform -chdir="${TF_WORKING_DIR}" output -raw acr_login_server)" >> "${GITHUB_OUTPUT}"
          echo "aks_name=$(terraform -chdir="${TF_WORKING_DIR}" output -raw aks_name)" >> "${GITHUB_OUTPUT}"
          echo "aks_namespace=$(terraform -chdir="${TF_WORKING_DIR}" output -raw aks_namespace)" >> "${GITHUB_OUTPUT}"
          echo "resource_group_name=$(terraform -chdir="${TF_WORKING_DIR}" output -raw resource_group_name)" >> "${GITHUB_OUTPUT}"
          echo "key_vault_name=$(terraform -chdir="${TF_WORKING_DIR}" output -raw key_vault_name)" >> "${GITHUB_OUTPUT}"
          echo "aks_keyvault_csi_client_id=$(terraform -chdir="${TF_WORKING_DIR}" output -raw aks_keyvault_csi_client_id)" >> "${GITHUB_OUTPUT}"

  acr-registry:
    runs-on: ubuntu-latest
    needs: terraform-infra
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate ACR access
        run: |
          ACR_NAME="${{ needs.terraform-infra.outputs.acr_login_server }}"
          ACR_NAME="${ACR_NAME%%.azurecr.io}"
          az acr show --name "${ACR_NAME}" --resource-group "${{ needs.terraform-infra.outputs.resource_group_name }}"
          az acr login --name "${ACR_NAME}"

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - terraform-infra
      - acr-registry
    permissions:
      id-token: write
      contents: read
    outputs:
      image_ref: ${{ steps.image_meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare research-agent build context
        run: |
          BUILD_CONTEXT="${RUNNER_TEMP}/research-agent-build"
          mkdir -p "${BUILD_CONTEXT}/projects/research_agent"
          cp pyproject.toml "${BUILD_CONTEXT}/pyproject.toml"
          cp -R packages "${BUILD_CONTEXT}/packages"
          cp -R projects/research_agent/app "${BUILD_CONTEXT}/projects/research_agent/app"
          cp projects/research_agent/agent.py "${BUILD_CONTEXT}/projects/research_agent/agent.py"
          cp projects/research_agent/requirements-research-agent.txt "${BUILD_CONTEXT}/projects/research_agent/requirements-research-agent.txt"
          echo "BUILD_CONTEXT=${BUILD_CONTEXT}" >> "${GITHUB_ENV}"

      - name: Login Docker to ACR
        run: |
          ACR_NAME="${{ needs.terraform-infra.outputs.acr_login_server }}"
          ACR_NAME="${ACR_NAME%%.azurecr.io}"
          az acr login --name "${ACR_NAME}"

      - name: Build and push image to ACR
        id: image_meta
        run: |
          IMAGE_REF="${{ needs.terraform-infra.outputs.acr_login_server }}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build \
            -f "${GITHUB_WORKSPACE}/projects/research_agent/Dockerfile" \
            -t "${IMAGE_REF}" \
            "${BUILD_CONTEXT}"

          docker push "${IMAGE_REF}"
          echo "image_ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"

  helm-deploy:
    runs-on: ubuntu-latest
    needs:
      - terraform-infra
      - docker-build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: Azure/aks-set-context@v4
        with:
          resource-group: ${{ needs.terraform-infra.outputs.resource_group_name }}
          cluster-name: ${{ needs.terraform-infra.outputs.aks_name }}

      - name: Install Helm
        uses: azure/setup-helm@v4.3.0

      - name: Deploy with Helm
        run: |
          helm upgrade --install "${HELM_RELEASE_NAME}" \
            ./deploy/helm/charts/fastapi-service \
            --namespace "${{ needs.terraform-infra.outputs.aks_namespace }}" \
            --create-namespace \
            -f ./projects/research_agent/deploy/azure/values.yaml \
            --set image.repository="${{ needs.terraform-infra.outputs.acr_login_server }}/${IMAGE_NAME}" \
            --set image.tag="${GITHUB_SHA}" \
            --set ingress.enabled=true \
            --set ingress.host="${RESEARCH_AGENT_HOST}" \
            --set ingress.tls.enabled=true \
            --set ingress.tls.secretName="${RESEARCH_AGENT_TLS_SECRET_NAME}" \
            --set keyVault.enabled=true \
            --set keyVault.name="${{ needs.terraform-infra.outputs.key_vault_name }}" \
            --set keyVault.tenantId="${{ secrets.AZURE_TENANT_ID }}" \
            --set keyVault.userAssignedIdentityID="${{ needs.terraform-infra.outputs.aks_keyvault_csi_client_id }}"
