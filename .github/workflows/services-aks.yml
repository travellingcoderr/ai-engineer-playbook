name: services-aks

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - research_agent
          - rag_system
  push:
    branches:
      - main
    paths:
      - "projects/research_agent/**"
      - "projects/rag_system/**"
      - "deploy/helm/**"
      - "deploy/azure/terraform/modules/**"
      - ".github/workflows/services-aks.yml"

env:
  AZURE_CORE_OUTPUT: none
  TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP || 'rg-tfstate-shared-dev' }}
  TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
  TFSTATE_CONTAINER: ${{ vars.TFSTATE_CONTAINER || 'tfstate' }}
  KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON: ${{ vars.KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON || '[]' }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      research_agent: ${{ steps.flags.outputs.research_agent }}
      rag_system: ${{ steps.flags.outputs.rag_system }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            research_agent:
              - 'projects/research_agent/**'
              - 'deploy/helm/**'
              - 'deploy/azure/terraform/modules/**'
              - '.github/workflows/services-aks.yml'
            rag_system:
              - 'projects/rag_system/**'
              - 'deploy/helm/**'
              - 'deploy/azure/terraform/modules/**'
              - '.github/workflows/services-aks.yml'

      - name: Resolve workflow targets
        id: flags
        run: |
          research="${{ steps.changes.outputs.research_agent }}"
          rag="${{ steps.changes.outputs.rag_system }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.service }}" in
              all)
                research=true
                rag=true
                ;;
              research_agent)
                research=true
                rag=false
                ;;
              rag_system)
                research=false
                rag=true
                ;;
            esac
          fi

          echo "research_agent=${research}" >> "${GITHUB_OUTPUT}"
          echo "rag_system=${rag}" >> "${GITHUB_OUTPUT}"

  research-agent-terraform:
    if: needs.detect-changes.outputs.research_agent == 'true'
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      IMAGE_NAME: research-agent
      HELM_RELEASE_NAME: research-agent
      TF_WORKING_DIR: projects/research_agent/deploy/azure/terraform
      SERVICE_RESOURCE_GROUP: ${{ vars.RESEARCH_AGENT_RESOURCE_GROUP || 'rg-research-agent-dev' }}
      SERVICE_LOCATION: ${{ vars.RESEARCH_AGENT_LOCATION || 'eastus' }}
      SERVICE_ACR_NAME: ${{ vars.RESEARCH_AGENT_ACR_NAME || 'researchagentacrdev' }}
      SERVICE_AKS_NAME: ${{ vars.RESEARCH_AGENT_AKS_NAME || 'aks-research-agent-dev' }}
      SERVICE_AKS_NODE_COUNT: ${{ vars.RESEARCH_AGENT_AKS_NODE_COUNT || '1' }}
      SERVICE_AKS_VM_SIZE: ${{ vars.RESEARCH_AGENT_AKS_VM_SIZE || 'Standard_DC2as_v5' }}
      SERVICE_AKS_NAMESPACE: ${{ vars.RESEARCH_AGENT_AKS_NAMESPACE || 'research-agent-dev' }}
      SERVICE_KEY_VAULT_NAME: ${{ vars.RESEARCH_AGENT_KEY_VAULT_NAME || 'kv-research-agent-dev007' }}
      SERVICE_HOST: ${{ vars.RESEARCH_AGENT_HOST || 'research.purpletechllc.com' }}
      SERVICE_TLS_SECRET_NAME: ${{ vars.RESEARCH_AGENT_TLS_SECRET_NAME || 'research-agent-tls' }}
      TFSTATE_KEY: ${{ vars.TFSTATE_KEY_RESEARCH_AGENT || 'research-agent-dev.tfstate' }}
    outputs:
      acr_login_server: ${{ steps.tf_outputs.outputs.acr_login_server }}
      aks_name: ${{ steps.tf_outputs.outputs.aks_name }}
      aks_namespace: ${{ steps.tf_outputs.outputs.aks_namespace }}
      resource_group_name: ${{ steps.tf_outputs.outputs.resource_group_name }}
      key_vault_name: ${{ steps.tf_outputs.outputs.key_vault_name }}
      aks_keyvault_csi_client_id: ${{ steps.tf_outputs.outputs.aks_keyvault_csi_client_id }}
      service_host: ${{ steps.tf_outputs.outputs.service_host }}
      service_tls_secret_name: ${{ steps.tf_outputs.outputs.service_tls_secret_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        run: |
          missing=0
          check_secret() {
            if [ -z "$2" ]; then
              echo "Missing secret: $1"
              missing=1
            else
              masked="$(printf '%s' "$2" | cut -c1-8)*"
              echo "Secret present: $1=${masked}"
            fi
          }
          check_variable() {
            if [ -z "$2" ]; then
              echo "Missing variable: $1"
              missing=1
            else
              echo "Variable $1=$2"
            fi
          }
          check_secret "AZURE_CLIENT_ID" "${{ secrets.AZURE_CLIENT_ID }}"
          check_secret "AZURE_TENANT_ID" "${{ secrets.AZURE_TENANT_ID }}"
          check_secret "AZURE_SUBSCRIPTION_ID" "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          check_variable "SERVICE_RESOURCE_GROUP" "${SERVICE_RESOURCE_GROUP}"
          check_variable "SERVICE_LOCATION" "${SERVICE_LOCATION}"
          check_variable "SERVICE_ACR_NAME" "${SERVICE_ACR_NAME}"
          check_variable "SERVICE_AKS_NAME" "${SERVICE_AKS_NAME}"
          check_variable "SERVICE_AKS_NODE_COUNT" "${SERVICE_AKS_NODE_COUNT}"
          check_variable "SERVICE_AKS_VM_SIZE" "${SERVICE_AKS_VM_SIZE}"
          check_variable "SERVICE_AKS_NAMESPACE" "${SERVICE_AKS_NAMESPACE}"
          check_variable "SERVICE_KEY_VAULT_NAME" "${SERVICE_KEY_VAULT_NAME}"
          check_variable "SERVICE_HOST" "${SERVICE_HOST}"
          check_variable "SERVICE_TLS_SECRET_NAME" "${SERVICE_TLS_SECRET_NAME}"
          check_variable "TFSTATE_RESOURCE_GROUP" "${TFSTATE_RESOURCE_GROUP}"
          check_variable "TFSTATE_STORAGE_ACCOUNT" "${TFSTATE_STORAGE_ACCOUNT}"
          check_variable "TFSTATE_CONTAINER" "${TFSTATE_CONTAINER}"
          check_variable "TFSTATE_KEY" "${TFSTATE_KEY}"
          if [ -z "${TFSTATE_STORAGE_ACCOUNT}" ]; then
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Bootstrap Terraform backend
        run: |
          az group create --name "${TFSTATE_RESOURCE_GROUP}" --location "${SERVICE_LOCATION}"
          az storage account create \
            --name "${TFSTATE_STORAGE_ACCOUNT}" \
            --resource-group "${TFSTATE_RESOURCE_GROUP}" \
            --location "${SERVICE_LOCATION}" \
            --sku Standard_LRS \
            --allow-blob-public-access false \
            --min-tls-version TLS1_2
          TFSTATE_ACCESS_KEY="$(az storage account keys list \
            --resource-group "${TFSTATE_RESOURCE_GROUP}" \
            --account-name "${TFSTATE_STORAGE_ACCOUNT}" \
            --query '[0].value' --output tsv)"
          az storage container create \
            --name "${TFSTATE_CONTAINER}" \
            --account-name "${TFSTATE_STORAGE_ACCOUNT}" \
            --account-key "${TFSTATE_ACCESS_KEY}"
          echo "TFSTATE_ACCESS_KEY=${TFSTATE_ACCESS_KEY}" >> "${GITHUB_ENV}"

      - name: Write Terraform input file
        run: |
          cat > "${TF_WORKING_DIR}/github.auto.tfvars" <<EOF
          azure_subscription_id = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          resource_group_name   = "${SERVICE_RESOURCE_GROUP}"
          location              = "${SERVICE_LOCATION}"
          acr_name              = "${SERVICE_ACR_NAME}"
          aks_name              = "${SERVICE_AKS_NAME}"
          aks_node_count        = ${SERVICE_AKS_NODE_COUNT}
          aks_vm_size           = "${SERVICE_AKS_VM_SIZE}"
          aks_namespace         = "${SERVICE_AKS_NAMESPACE}"
          key_vault_name        = "${SERVICE_KEY_VAULT_NAME}"
          enable_app_routing    = true
          enable_keyvault_csi   = true
          github_actions_client_id               = "${{ secrets.AZURE_CLIENT_ID }}"
          enable_github_actions_role_assignments = true
          enable_github_actions_subscription_contributor = true
          key_vault_secrets_officer_object_ids   = ${KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON}
          EOF

      - name: Terraform init
        run: |
          terraform -chdir="${TF_WORKING_DIR}" init -input=false \
            -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TFSTATE_CONTAINER}" \
            -backend-config="key=${TFSTATE_KEY}" \
            -backend-config="access_key=${TFSTATE_ACCESS_KEY}"

      - name: Terraform plan
        run: terraform -chdir="${TF_WORKING_DIR}" plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform -chdir="${TF_WORKING_DIR}" apply -input=false -auto-approve tfplan

      - name: Export Terraform outputs
        id: tf_outputs
        run: |
          echo "acr_login_server=$(terraform -chdir="${TF_WORKING_DIR}" output -raw acr_login_server)" >> "${GITHUB_OUTPUT}"
          echo "aks_name=$(terraform -chdir="${TF_WORKING_DIR}" output -raw aks_name)" >> "${GITHUB_OUTPUT}"
          echo "aks_namespace=$(terraform -chdir="${TF_WORKING_DIR}" output -raw aks_namespace)" >> "${GITHUB_OUTPUT}"
          echo "resource_group_name=$(terraform -chdir="${TF_WORKING_DIR}" output -raw resource_group_name)" >> "${GITHUB_OUTPUT}"
          echo "key_vault_name=$(terraform -chdir="${TF_WORKING_DIR}" output -raw key_vault_name)" >> "${GITHUB_OUTPUT}"
          echo "aks_keyvault_csi_client_id=$(terraform -chdir="${TF_WORKING_DIR}" output -raw aks_keyvault_csi_client_id)" >> "${GITHUB_OUTPUT}"
          echo "service_host=${SERVICE_HOST}" >> "${GITHUB_OUTPUT}"
          echo "service_tls_secret_name=${SERVICE_TLS_SECRET_NAME}" >> "${GITHUB_OUTPUT}"

  research-agent-acr:
    if: needs.detect-changes.outputs.research_agent == 'true'
    needs:
      - detect-changes
      - research-agent-terraform
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Validate ACR access
        run: |
          ACR_NAME="${{ needs.research-agent-terraform.outputs.acr_login_server }}"
          ACR_NAME="${ACR_NAME%%.azurecr.io}"
          az acr show --name "${ACR_NAME}" --resource-group "${{ needs.research-agent-terraform.outputs.resource_group_name }}"
          az acr login --name "${ACR_NAME}"

  research-agent-build:
    if: needs.detect-changes.outputs.research_agent == 'true'
    needs:
      - detect-changes
      - research-agent-terraform
      - research-agent-acr
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Prepare research-agent build context
        run: |
          BUILD_CONTEXT="${RUNNER_TEMP}/research-agent-build"
          mkdir -p "${BUILD_CONTEXT}/projects/research_agent"
          cp pyproject.toml "${BUILD_CONTEXT}/pyproject.toml"
          cp -R packages "${BUILD_CONTEXT}/packages"
          cp -R projects/research_agent/app "${BUILD_CONTEXT}/projects/research_agent/app"
          cp projects/research_agent/agent.py "${BUILD_CONTEXT}/projects/research_agent/agent.py"
          cp projects/research_agent/requirements-research-agent.txt "${BUILD_CONTEXT}/projects/research_agent/requirements-research-agent.txt"
          echo "BUILD_CONTEXT=${BUILD_CONTEXT}" >> "${GITHUB_ENV}"
      - name: Login Docker to ACR
        run: |
          ACR_NAME="${{ needs.research-agent-terraform.outputs.acr_login_server }}"
          ACR_NAME="${ACR_NAME%%.azurecr.io}"
          az acr login --name "${ACR_NAME}"
      - name: Build and push image to ACR
        run: |
          IMAGE_REF="${{ needs.research-agent-terraform.outputs.acr_login_server }}/research-agent:${GITHUB_SHA}"
          docker build \
            -f "${GITHUB_WORKSPACE}/projects/research_agent/Dockerfile" \
            -t "${IMAGE_REF}" \
            "${BUILD_CONTEXT}"
          docker push "${IMAGE_REF}"

  research-agent-helm:
    if: needs.detect-changes.outputs.research_agent == 'true'
    needs:
      - detect-changes
      - research-agent-terraform
      - research-agent-build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Set AKS context
        uses: Azure/aks-set-context@v4
        with:
          resource-group: ${{ needs.research-agent-terraform.outputs.resource_group_name }}
          cluster-name: ${{ needs.research-agent-terraform.outputs.aks_name }}
      - name: Install Helm
        uses: azure/setup-helm@v4.3.0
      - name: Deploy research-agent with Helm
        run: |
          helm upgrade --install "research-agent" \
            ./deploy/helm/charts/fastapi-service \
            --namespace "${{ needs.research-agent-terraform.outputs.aks_namespace }}" \
            --create-namespace \
            -f ./projects/research_agent/deploy/azure/values.yaml \
            --set image.repository="${{ needs.research-agent-terraform.outputs.acr_login_server }}/research-agent" \
            --set image.tag="${GITHUB_SHA}" \
            --set ingress.enabled=true \
            --set ingress.host="${{ needs.research-agent-terraform.outputs.service_host }}" \
            --set ingress.tls.enabled=true \
            --set ingress.tls.secretName="${{ needs.research-agent-terraform.outputs.service_tls_secret_name }}" \
            --set keyVault.enabled=true \
            --set keyVault.name="${{ needs.research-agent-terraform.outputs.key_vault_name }}" \
            --set keyVault.tenantId="${{ secrets.AZURE_TENANT_ID }}" \
            --set keyVault.userAssignedIdentityID="${{ needs.research-agent-terraform.outputs.aks_keyvault_csi_client_id }}"

  rag-system-terraform:
    if: needs.detect-changes.outputs.rag_system == 'true'
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      IMAGE_NAME: rag-system
      HELM_RELEASE_NAME: rag-system
      TF_WORKING_DIR: projects/rag_system/deploy/azure/terraform
      SERVICE_RESOURCE_GROUP: ${{ vars.RAG_SYSTEM_RESOURCE_GROUP || 'rg-rag-system-dev' }}
      SERVICE_LOCATION: ${{ vars.RAG_SYSTEM_LOCATION || 'eastus' }}
      SERVICE_ACR_NAME: ${{ vars.RAG_SYSTEM_ACR_NAME || 'ragsystemacrdev' }}
      SERVICE_AKS_NAME: ${{ vars.RAG_SYSTEM_AKS_NAME || 'aks-rag-system-dev' }}
      SERVICE_AKS_NODE_COUNT: ${{ vars.RAG_SYSTEM_AKS_NODE_COUNT || '1' }}
      SERVICE_AKS_VM_SIZE: ${{ vars.RAG_SYSTEM_AKS_VM_SIZE || 'Standard_DC2as_v5' }}
      SERVICE_AKS_NAMESPACE: ${{ vars.RAG_SYSTEM_AKS_NAMESPACE || 'rag-system-dev' }}
      SERVICE_KEY_VAULT_NAME: ${{ vars.RAG_SYSTEM_KEY_VAULT_NAME || 'kv-rag-system-dev001' }}
      SERVICE_HOST: ${{ vars.RAG_SYSTEM_HOST || 'rag.purpletechllc.com' }}
      SERVICE_TLS_SECRET_NAME: ${{ vars.RAG_SYSTEM_TLS_SECRET_NAME || 'rag-system-tls' }}
      TFSTATE_KEY: ${{ vars.TFSTATE_KEY_RAG_SYSTEM || 'rag-system-dev.tfstate' }}
    outputs:
      acr_login_server: ${{ steps.tf_outputs.outputs.acr_login_server }}
      aks_name: ${{ steps.tf_outputs.outputs.aks_name }}
      aks_namespace: ${{ steps.tf_outputs.outputs.aks_namespace }}
      resource_group_name: ${{ steps.tf_outputs.outputs.resource_group_name }}
      key_vault_name: ${{ steps.tf_outputs.outputs.key_vault_name }}
      aks_keyvault_csi_client_id: ${{ steps.tf_outputs.outputs.aks_keyvault_csi_client_id }}
      service_host: ${{ steps.tf_outputs.outputs.service_host }}
      service_tls_secret_name: ${{ steps.tf_outputs.outputs.service_tls_secret_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate workflow configuration
        run: |
          missing=0
          check_secret() {
            if [ -z "$2" ]; then
              echo "Missing secret: $1"
              missing=1
            else
              masked="$(printf '%s' "$2" | cut -c1-8)*"
              echo "Secret present: $1=${masked}"
            fi
          }
          check_variable() {
            if [ -z "$2" ]; then
              echo "Missing variable: $1"
              missing=1
            else
              echo "Variable $1=$2"
            fi
          }
          check_secret "AZURE_CLIENT_ID" "${{ secrets.AZURE_CLIENT_ID }}"
          check_secret "AZURE_TENANT_ID" "${{ secrets.AZURE_TENANT_ID }}"
          check_secret "AZURE_SUBSCRIPTION_ID" "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          check_variable "SERVICE_RESOURCE_GROUP" "${SERVICE_RESOURCE_GROUP}"
          check_variable "SERVICE_LOCATION" "${SERVICE_LOCATION}"
          check_variable "SERVICE_ACR_NAME" "${SERVICE_ACR_NAME}"
          check_variable "SERVICE_AKS_NAME" "${SERVICE_AKS_NAME}"
          check_variable "SERVICE_AKS_NODE_COUNT" "${SERVICE_AKS_NODE_COUNT}"
          check_variable "SERVICE_AKS_VM_SIZE" "${SERVICE_AKS_VM_SIZE}"
          check_variable "SERVICE_AKS_NAMESPACE" "${SERVICE_AKS_NAMESPACE}"
          check_variable "SERVICE_KEY_VAULT_NAME" "${SERVICE_KEY_VAULT_NAME}"
          check_variable "SERVICE_HOST" "${SERVICE_HOST}"
          check_variable "SERVICE_TLS_SECRET_NAME" "${SERVICE_TLS_SECRET_NAME}"
          check_variable "TFSTATE_RESOURCE_GROUP" "${TFSTATE_RESOURCE_GROUP}"
          check_variable "TFSTATE_STORAGE_ACCOUNT" "${TFSTATE_STORAGE_ACCOUNT}"
          check_variable "TFSTATE_CONTAINER" "${TFSTATE_CONTAINER}"
          check_variable "TFSTATE_KEY" "${TFSTATE_KEY}"
          if [ -z "${TFSTATE_STORAGE_ACCOUNT}" ]; then
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Bootstrap Terraform backend
        run: |
          az group create --name "${TFSTATE_RESOURCE_GROUP}" --location "${SERVICE_LOCATION}"
          az storage account create \
            --name "${TFSTATE_STORAGE_ACCOUNT}" \
            --resource-group "${TFSTATE_RESOURCE_GROUP}" \
            --location "${SERVICE_LOCATION}" \
            --sku Standard_LRS \
            --allow-blob-public-access false \
            --min-tls-version TLS1_2
          TFSTATE_ACCESS_KEY="$(az storage account keys list \
            --resource-group "${TFSTATE_RESOURCE_GROUP}" \
            --account-name "${TFSTATE_STORAGE_ACCOUNT}" \
            --query '[0].value' --output tsv)"
          az storage container create \
            --name "${TFSTATE_CONTAINER}" \
            --account-name "${TFSTATE_STORAGE_ACCOUNT}" \
            --account-key "${TFSTATE_ACCESS_KEY}"
          echo "TFSTATE_ACCESS_KEY=${TFSTATE_ACCESS_KEY}" >> "${GITHUB_ENV}"
      - name: Write Terraform input file
        run: |
          cat > "${TF_WORKING_DIR}/github.auto.tfvars" <<EOF
          azure_subscription_id = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          resource_group_name   = "${SERVICE_RESOURCE_GROUP}"
          location              = "${SERVICE_LOCATION}"
          acr_name              = "${SERVICE_ACR_NAME}"
          aks_name              = "${SERVICE_AKS_NAME}"
          aks_node_count        = ${SERVICE_AKS_NODE_COUNT}
          aks_vm_size           = "${SERVICE_AKS_VM_SIZE}"
          aks_namespace         = "${SERVICE_AKS_NAMESPACE}"
          key_vault_name        = "${SERVICE_KEY_VAULT_NAME}"
          enable_app_routing    = true
          enable_keyvault_csi   = true
          github_actions_client_id               = "${{ secrets.AZURE_CLIENT_ID }}"
          enable_github_actions_role_assignments = true
          enable_github_actions_subscription_contributor = true
          key_vault_secrets_officer_object_ids   = ${KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON}
          EOF
      - name: Terraform init
        run: |
          terraform -chdir="${TF_WORKING_DIR}" init -input=false \
            -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TFSTATE_CONTAINER}" \
            -backend-config="key=${TFSTATE_KEY}" \
            -backend-config="access_key=${TFSTATE_ACCESS_KEY}"
      - name: Terraform plan
        run: terraform -chdir="${TF_WORKING_DIR}" plan -input=false -out=tfplan
      - name: Terraform apply
        run: terraform -chdir="${TF_WORKING_DIR}" apply -input=false -auto-approve tfplan
      - name: Export Terraform outputs
        id: tf_outputs
        run: |
          echo "acr_login_server=$(terraform -chdir="${TF_WORKING_DIR}" output -raw acr_login_server)" >> "${GITHUB_OUTPUT}"
          echo "aks_name=$(terraform -chdir="${TF_WORKING_DIR}" output -raw aks_name)" >> "${GITHUB_OUTPUT}"
          echo "aks_namespace=$(terraform -chdir="${TF_WORKING_DIR}" output -raw aks_namespace)" >> "${GITHUB_OUTPUT}"
          echo "resource_group_name=$(terraform -chdir="${TF_WORKING_DIR}" output -raw resource_group_name)" >> "${GITHUB_OUTPUT}"
          echo "key_vault_name=$(terraform -chdir="${TF_WORKING_DIR}" output -raw key_vault_name)" >> "${GITHUB_OUTPUT}"
          echo "aks_keyvault_csi_client_id=$(terraform -chdir="${TF_WORKING_DIR}" output -raw aks_keyvault_csi_client_id)" >> "${GITHUB_OUTPUT}"
          echo "service_host=${SERVICE_HOST}" >> "${GITHUB_OUTPUT}"
          echo "service_tls_secret_name=${SERVICE_TLS_SECRET_NAME}" >> "${GITHUB_OUTPUT}"

  rag-system-acr:
    if: needs.detect-changes.outputs.rag_system == 'true'
    needs:
      - detect-changes
      - rag-system-terraform
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Validate ACR access
        run: |
          ACR_NAME="${{ needs.rag-system-terraform.outputs.acr_login_server }}"
          ACR_NAME="${ACR_NAME%%.azurecr.io}"
          az acr show --name "${ACR_NAME}" --resource-group "${{ needs.rag-system-terraform.outputs.resource_group_name }}"
          az acr login --name "${ACR_NAME}"

  rag-system-build:
    if: needs.detect-changes.outputs.rag_system == 'true'
    needs:
      - detect-changes
      - rag-system-terraform
      - rag-system-acr
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Prepare rag-system build context
        run: |
          BUILD_CONTEXT="${RUNNER_TEMP}/rag-system-build"
          mkdir -p "${BUILD_CONTEXT}/projects/rag_system"
          cp pyproject.toml "${BUILD_CONTEXT}/pyproject.toml"
          cp -R packages "${BUILD_CONTEXT}/packages"
          cp -R projects/rag_system/app "${BUILD_CONTEXT}/projects/rag_system/app"
          cp projects/rag_system/requirements-rag-system.txt "${BUILD_CONTEXT}/projects/rag_system/requirements-rag-system.txt"
          echo "BUILD_CONTEXT=${BUILD_CONTEXT}" >> "${GITHUB_ENV}"
      - name: Login Docker to ACR
        run: |
          ACR_NAME="${{ needs.rag-system-terraform.outputs.acr_login_server }}"
          ACR_NAME="${ACR_NAME%%.azurecr.io}"
          az acr login --name "${ACR_NAME}"
      - name: Build and push image to ACR
        run: |
          IMAGE_REF="${{ needs.rag-system-terraform.outputs.acr_login_server }}/rag-system:${GITHUB_SHA}"
          docker build \
            -f "${GITHUB_WORKSPACE}/projects/rag_system/Dockerfile" \
            -t "${IMAGE_REF}" \
            "${BUILD_CONTEXT}"
          docker push "${IMAGE_REF}"

  rag-system-helm:
    if: needs.detect-changes.outputs.rag_system == 'true'
    needs:
      - detect-changes
      - rag-system-terraform
      - rag-system-build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Set AKS context
        uses: Azure/aks-set-context@v4
        with:
          resource-group: ${{ needs.rag-system-terraform.outputs.resource_group_name }}
          cluster-name: ${{ needs.rag-system-terraform.outputs.aks_name }}
      - name: Install Helm
        uses: azure/setup-helm@v4.3.0
      - name: Deploy rag-system with Helm
        run: |
          helm upgrade --install "rag-system" \
            ./deploy/helm/charts/fastapi-service \
            --namespace "${{ needs.rag-system-terraform.outputs.aks_namespace }}" \
            --create-namespace \
            -f ./projects/rag_system/deploy/azure/values.yaml \
            --set image.repository="${{ needs.rag-system-terraform.outputs.acr_login_server }}/rag-system" \
            --set image.tag="${GITHUB_SHA}" \
            --set ingress.enabled=true \
            --set ingress.host="${{ needs.rag-system-terraform.outputs.service_host }}" \
            --set ingress.tls.enabled=true \
            --set ingress.tls.secretName="${{ needs.rag-system-terraform.outputs.service_tls_secret_name }}" \
            --set keyVault.enabled=true \
            --set keyVault.name="${{ needs.rag-system-terraform.outputs.key_vault_name }}" \
            --set keyVault.tenantId="${{ secrets.AZURE_TENANT_ID }}" \
            --set keyVault.userAssignedIdentityID="${{ needs.rag-system-terraform.outputs.aks_keyvault_csi_client_id }}"
