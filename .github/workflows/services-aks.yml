name: services-aks

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - research_agent
          - rag_system
  push:
    branches:
      - main
    paths:
      - "projects/research_agent/**"
      - "projects/rag_system/**"
      - "deploy/helm/**"
      - "deploy/azure/terraform/modules/**"
      - ".github/workflows/services-aks.yml"

env:
  AZURE_CORE_OUTPUT: none
  TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP || 'rg-tfstate-shared-dev' }}
  TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
  TFSTATE_CONTAINER: ${{ vars.TFSTATE_CONTAINER || 'tfstate' }}
  KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON: ${{ vars.KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON || '[]' }}
  ENABLE_RBAC_ROLE_ASSIGNMENTS: ${{ vars.ENABLE_RBAC_ROLE_ASSIGNMENTS || 'true' }}
  ENABLE_GITHUB_ACTIONS_SUBSCRIPTION_ROLE_ASSIGNMENTS: ${{ vars.ENABLE_GITHUB_ACTIONS_SUBSCRIPTION_ROLE_ASSIGNMENTS || 'false' }}
  ENABLE_GITHUB_ACTIONS_SUBSCRIPTION_CONTRIBUTOR: ${{ vars.ENABLE_GITHUB_ACTIONS_SUBSCRIPTION_CONTRIBUTOR || 'false' }}
  ENABLE_GITHUB_ACTIONS_USER_ACCESS_ADMINISTRATOR: ${{ vars.ENABLE_GITHUB_ACTIONS_USER_ACCESS_ADMINISTRATOR || 'false' }}
  ENABLE_RESEARCH_AGENT_DEPLOY: ${{ vars.ENABLE_RESEARCH_AGENT_DEPLOY || 'true' }}
  ENABLE_RAG_SYSTEM_DEPLOY: ${{ vars.ENABLE_RAG_SYSTEM_DEPLOY || 'true' }}

  RESEARCH_AGENT_RESOURCE_GROUP: ${{ vars.RESEARCH_AGENT_RESOURCE_GROUP || 'rg-research-agent-dev' }}
  RESEARCH_AGENT_LOCATION: ${{ vars.RESEARCH_AGENT_LOCATION || 'eastus' }}
  RESEARCH_AGENT_ACR_NAME: ${{ vars.RESEARCH_AGENT_ACR_NAME || 'researchagentacrdev' }}
  RESEARCH_AGENT_AKS_NAME: ${{ vars.RESEARCH_AGENT_AKS_NAME || 'aks-research-agent-dev' }}
  RESEARCH_AGENT_AKS_NODE_COUNT: ${{ vars.RESEARCH_AGENT_AKS_NODE_COUNT || '1' }}
  RESEARCH_AGENT_AKS_VM_SIZE: ${{ vars.RESEARCH_AGENT_AKS_VM_SIZE || 'Standard_DC2as_v5' }}
  RESEARCH_AGENT_AKS_NODE_POOL_MAX_SURGE: ${{ vars.RESEARCH_AGENT_AKS_NODE_POOL_MAX_SURGE || '1' }}
  RESEARCH_AGENT_AKS_NAMESPACE: ${{ vars.RESEARCH_AGENT_AKS_NAMESPACE || 'research-agent-dev' }}
  RESEARCH_AGENT_KEY_VAULT_NAME: ${{ vars.RESEARCH_AGENT_KEY_VAULT_NAME || 'kv-research-agent-dev007' }}
  RESEARCH_AGENT_HOST: ${{ vars.RESEARCH_AGENT_HOST || 'research.purpletechllc.com' }}
  RESEARCH_AGENT_TLS_SECRET_NAME: ${{ vars.RESEARCH_AGENT_TLS_SECRET_NAME || 'research-agent-tls' }}
  TFSTATE_KEY_RESEARCH_AGENT: ${{ vars.TFSTATE_KEY_RESEARCH_AGENT || 'research-agent-dev.tfstate' }}

  RAG_SYSTEM_RESOURCE_GROUP: ${{ vars.RAG_SYSTEM_RESOURCE_GROUP || 'rg-rag-system-dev' }}
  RAG_SYSTEM_LOCATION: ${{ vars.RAG_SYSTEM_LOCATION || 'eastus' }}
  RAG_SYSTEM_ACR_NAME: ${{ vars.RAG_SYSTEM_ACR_NAME || 'ragsystemacrdev' }}
  RAG_SYSTEM_AKS_NAME: ${{ vars.RAG_SYSTEM_AKS_NAME || 'aks-rag-system-dev' }}
  RAG_SYSTEM_AKS_NODE_COUNT: ${{ vars.RAG_SYSTEM_AKS_NODE_COUNT || '1' }}
  RAG_SYSTEM_AKS_VM_SIZE: ${{ vars.RAG_SYSTEM_AKS_VM_SIZE || 'Standard_DC2as_v5' }}
  RAG_SYSTEM_AKS_NODE_POOL_MAX_SURGE: ${{ vars.RAG_SYSTEM_AKS_NODE_POOL_MAX_SURGE || '1' }}
  RAG_SYSTEM_AKS_NAMESPACE: ${{ vars.RAG_SYSTEM_AKS_NAMESPACE || 'rag-system-dev' }}
  RAG_SYSTEM_KEY_VAULT_NAME: ${{ vars.RAG_SYSTEM_KEY_VAULT_NAME || 'kv-rag-system-dev001' }}
  RAG_SYSTEM_HOST: ${{ vars.RAG_SYSTEM_HOST || 'rag.purpletechllc.com' }}
  RAG_SYSTEM_TLS_SECRET_NAME: ${{ vars.RAG_SYSTEM_TLS_SECRET_NAME || 'rag-system-tls' }}
  TFSTATE_KEY_RAG_SYSTEM: ${{ vars.TFSTATE_KEY_RAG_SYSTEM || 'rag-system-dev.tfstate' }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            research_agent:
              - 'projects/research_agent/**'
              - 'deploy/helm/**'
              - 'deploy/azure/terraform/modules/**'
              - '.github/workflows/services-aks.yml'
            rag_system:
              - 'projects/rag_system/**'
              - 'deploy/helm/**'
              - 'deploy/azure/terraform/modules/**'
              - '.github/workflows/services-aks.yml'

      - name: Build matrix
        id: matrix
        run: |
          services=()

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.service }}" in
              all)
                if [ "${ENABLE_RESEARCH_AGENT_DEPLOY}" = "true" ]; then
                  services+=("research_agent")
                fi
                if [ "${ENABLE_RAG_SYSTEM_DEPLOY}" = "true" ]; then
                  services+=("rag_system")
                fi
                ;;
              research_agent)
                if [ "${ENABLE_RESEARCH_AGENT_DEPLOY}" = "true" ]; then
                  services=("research_agent")
                fi
                ;;
              rag_system)
                if [ "${ENABLE_RAG_SYSTEM_DEPLOY}" = "true" ]; then
                  services=("rag_system")
                fi
                ;;
            esac
          else
            if [ "${ENABLE_RESEARCH_AGENT_DEPLOY}" = "true" ] && [ "${{ steps.changes.outputs.research_agent }}" = "true" ]; then
              services+=("research_agent")
            fi
            if [ "${ENABLE_RAG_SYSTEM_DEPLOY}" = "true" ] && [ "${{ steps.changes.outputs.rag_system }}" = "true" ]; then
              services+=("rag_system")
            fi
          fi

          if [ ${#services[@]} -eq 0 ]; then
            echo 'matrix={"include":[]}' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          json='{"include":['
          for i in "${!services[@]}"; do
            service="${services[$i]}"
            if [ "$i" -gt 0 ]; then
              json+=','
            fi
            json+="{\"service\":\"${service}\"}"
          done
          json+=']}'

          echo "matrix=${json}" >> "${GITHUB_OUTPUT}"

  deploy-service:
    needs: detect-changes
    if: ${{ fromJson(needs.detect-changes.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve service configuration
        run: |
          case "${{ matrix.service }}" in
            research_agent)
              echo "IMAGE_NAME=research-agent" >> "${GITHUB_ENV}"
              echo "HELM_RELEASE_NAME=research-agent" >> "${GITHUB_ENV}"
              echo "TF_WORKING_DIR=projects/research_agent/deploy/azure/terraform" >> "${GITHUB_ENV}"
              echo "DOCKERFILE=projects/research_agent/Dockerfile" >> "${GITHUB_ENV}"
              echo "VALUES_FILE=projects/research_agent/deploy/azure/values.yaml" >> "${GITHUB_ENV}"
              echo "SERVICE_RESOURCE_GROUP=${RESEARCH_AGENT_RESOURCE_GROUP}" >> "${GITHUB_ENV}"
              echo "SERVICE_LOCATION=${RESEARCH_AGENT_LOCATION}" >> "${GITHUB_ENV}"
              echo "SERVICE_ACR_NAME=${RESEARCH_AGENT_ACR_NAME}" >> "${GITHUB_ENV}"
              echo "SERVICE_AKS_NAME=${RESEARCH_AGENT_AKS_NAME}" >> "${GITHUB_ENV}"
              echo "SERVICE_AKS_NODE_COUNT=${RESEARCH_AGENT_AKS_NODE_COUNT}" >> "${GITHUB_ENV}"
              echo "SERVICE_AKS_VM_SIZE=${RESEARCH_AGENT_AKS_VM_SIZE}" >> "${GITHUB_ENV}"
              echo "SERVICE_AKS_NODE_POOL_MAX_SURGE=${RESEARCH_AGENT_AKS_NODE_POOL_MAX_SURGE}" >> "${GITHUB_ENV}"
              echo "SERVICE_AKS_NAMESPACE=${RESEARCH_AGENT_AKS_NAMESPACE}" >> "${GITHUB_ENV}"
              echo "SERVICE_KEY_VAULT_NAME=${RESEARCH_AGENT_KEY_VAULT_NAME}" >> "${GITHUB_ENV}"
              echo "SERVICE_HOST=${RESEARCH_AGENT_HOST}" >> "${GITHUB_ENV}"
              echo "SERVICE_TLS_SECRET_NAME=${RESEARCH_AGENT_TLS_SECRET_NAME}" >> "${GITHUB_ENV}"
              echo "TFSTATE_KEY=${TFSTATE_KEY_RESEARCH_AGENT}" >> "${GITHUB_ENV}"
              ;;
            rag_system)
              echo "IMAGE_NAME=rag-system" >> "${GITHUB_ENV}"
              echo "HELM_RELEASE_NAME=rag-system" >> "${GITHUB_ENV}"
              echo "TF_WORKING_DIR=projects/rag_system/deploy/azure/terraform" >> "${GITHUB_ENV}"
              echo "DOCKERFILE=projects/rag_system/Dockerfile" >> "${GITHUB_ENV}"
              echo "VALUES_FILE=projects/rag_system/deploy/azure/values.yaml" >> "${GITHUB_ENV}"
              echo "SERVICE_RESOURCE_GROUP=${RAG_SYSTEM_RESOURCE_GROUP}" >> "${GITHUB_ENV}"
              echo "SERVICE_LOCATION=${RAG_SYSTEM_LOCATION}" >> "${GITHUB_ENV}"
              echo "SERVICE_ACR_NAME=${RAG_SYSTEM_ACR_NAME}" >> "${GITHUB_ENV}"
              echo "SERVICE_AKS_NAME=${RAG_SYSTEM_AKS_NAME}" >> "${GITHUB_ENV}"
              echo "SERVICE_AKS_NODE_COUNT=${RAG_SYSTEM_AKS_NODE_COUNT}" >> "${GITHUB_ENV}"
              echo "SERVICE_AKS_VM_SIZE=${RAG_SYSTEM_AKS_VM_SIZE}" >> "${GITHUB_ENV}"
              echo "SERVICE_AKS_NODE_POOL_MAX_SURGE=${RAG_SYSTEM_AKS_NODE_POOL_MAX_SURGE}" >> "${GITHUB_ENV}"
              echo "SERVICE_AKS_NAMESPACE=${RAG_SYSTEM_AKS_NAMESPACE}" >> "${GITHUB_ENV}"
              echo "SERVICE_KEY_VAULT_NAME=${RAG_SYSTEM_KEY_VAULT_NAME}" >> "${GITHUB_ENV}"
              echo "SERVICE_HOST=${RAG_SYSTEM_HOST}" >> "${GITHUB_ENV}"
              echo "SERVICE_TLS_SECRET_NAME=${RAG_SYSTEM_TLS_SECRET_NAME}" >> "${GITHUB_ENV}"
              echo "TFSTATE_KEY=${TFSTATE_KEY_RAG_SYSTEM}" >> "${GITHUB_ENV}"
              ;;
          esac

      - name: Validate workflow configuration
        run: |
          missing=0
          check_secret() {
            if [ -z "$2" ]; then
              echo "Missing secret: $1"
              missing=1
            else
              masked="$(printf '%s' "$2" | cut -c1-8)*"
              echo "Secret present: $1=${masked}"
            fi
          }

          check_variable() {
            if [ -z "$2" ]; then
              echo "Missing variable: $1"
              missing=1
            else
              echo "Variable $1=$2"
            fi
          }

          check_secret "AZURE_CLIENT_ID" "${{ secrets.AZURE_CLIENT_ID }}"
          check_secret "AZURE_TENANT_ID" "${{ secrets.AZURE_TENANT_ID }}"
          check_secret "AZURE_SUBSCRIPTION_ID" "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          check_variable "SERVICE_RESOURCE_GROUP" "${SERVICE_RESOURCE_GROUP}"
          check_variable "SERVICE_LOCATION" "${SERVICE_LOCATION}"
          check_variable "SERVICE_ACR_NAME" "${SERVICE_ACR_NAME}"
          check_variable "SERVICE_AKS_NAME" "${SERVICE_AKS_NAME}"
          check_variable "SERVICE_AKS_NODE_COUNT" "${SERVICE_AKS_NODE_COUNT}"
          check_variable "SERVICE_AKS_VM_SIZE" "${SERVICE_AKS_VM_SIZE}"
          check_variable "SERVICE_AKS_NODE_POOL_MAX_SURGE" "${SERVICE_AKS_NODE_POOL_MAX_SURGE}"
          check_variable "SERVICE_AKS_NAMESPACE" "${SERVICE_AKS_NAMESPACE}"
          check_variable "SERVICE_KEY_VAULT_NAME" "${SERVICE_KEY_VAULT_NAME}"
          check_variable "SERVICE_HOST" "${SERVICE_HOST}"
          check_variable "SERVICE_TLS_SECRET_NAME" "${SERVICE_TLS_SECRET_NAME}"
          check_variable "TFSTATE_RESOURCE_GROUP" "${TFSTATE_RESOURCE_GROUP}"
          check_variable "TFSTATE_STORAGE_ACCOUNT" "${TFSTATE_STORAGE_ACCOUNT}"
          check_variable "TFSTATE_CONTAINER" "${TFSTATE_CONTAINER}"
          check_variable "TFSTATE_KEY" "${TFSTATE_KEY}"
          check_variable "ENABLE_RBAC_ROLE_ASSIGNMENTS" "${ENABLE_RBAC_ROLE_ASSIGNMENTS}"
          check_variable "ENABLE_GITHUB_ACTIONS_SUBSCRIPTION_ROLE_ASSIGNMENTS" "${ENABLE_GITHUB_ACTIONS_SUBSCRIPTION_ROLE_ASSIGNMENTS}"
          check_variable "ENABLE_GITHUB_ACTIONS_SUBSCRIPTION_CONTRIBUTOR" "${ENABLE_GITHUB_ACTIONS_SUBSCRIPTION_CONTRIBUTOR}"
          check_variable "ENABLE_GITHUB_ACTIONS_USER_ACCESS_ADMINISTRATOR" "${ENABLE_GITHUB_ACTIONS_USER_ACCESS_ADMINISTRATOR}"

          if [ -z "${TFSTATE_STORAGE_ACCOUNT}" ]; then
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Bootstrap Terraform backend
        run: |
          az group create --name "${TFSTATE_RESOURCE_GROUP}" --location "${SERVICE_LOCATION}"

          az storage account create \
            --name "${TFSTATE_STORAGE_ACCOUNT}" \
            --resource-group "${TFSTATE_RESOURCE_GROUP}" \
            --location "${SERVICE_LOCATION}" \
            --sku Standard_LRS \
            --allow-blob-public-access false \
            --min-tls-version TLS1_2

          TFSTATE_ACCESS_KEY="$(az storage account keys list \
            --resource-group "${TFSTATE_RESOURCE_GROUP}" \
            --account-name "${TFSTATE_STORAGE_ACCOUNT}" \
            --query '[0].value' \
            --output tsv)"

          az storage container create \
            --name "${TFSTATE_CONTAINER}" \
            --account-name "${TFSTATE_STORAGE_ACCOUNT}" \
            --account-key "${TFSTATE_ACCESS_KEY}"

          echo "TFSTATE_ACCESS_KEY=${TFSTATE_ACCESS_KEY}" >> "${GITHUB_ENV}"

      - name: Write Terraform input file
        run: |
          cat > "${TF_WORKING_DIR}/github.auto.tfvars" <<EOF
          azure_subscription_id = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          resource_group_name   = "${SERVICE_RESOURCE_GROUP}"
          location              = "${SERVICE_LOCATION}"
          acr_name              = "${SERVICE_ACR_NAME}"
          aks_name              = "${SERVICE_AKS_NAME}"
          aks_node_count        = ${SERVICE_AKS_NODE_COUNT}
          aks_vm_size           = "${SERVICE_AKS_VM_SIZE}"
          aks_node_pool_max_surge = "${SERVICE_AKS_NODE_POOL_MAX_SURGE}"
          aks_namespace         = "${SERVICE_AKS_NAMESPACE}"
          key_vault_name        = "${SERVICE_KEY_VAULT_NAME}"
          enable_rbac_role_assignments           = ${ENABLE_RBAC_ROLE_ASSIGNMENTS}
          enable_app_routing    = true
          enable_keyvault_csi   = true
          github_actions_client_id               = "${{ secrets.AZURE_CLIENT_ID }}"
          enable_github_actions_role_assignments = true
          enable_github_actions_subscription_role_assignments = ${ENABLE_GITHUB_ACTIONS_SUBSCRIPTION_ROLE_ASSIGNMENTS}
          enable_github_actions_subscription_contributor = ${ENABLE_GITHUB_ACTIONS_SUBSCRIPTION_CONTRIBUTOR}
          enable_github_actions_user_access_administrator = ${ENABLE_GITHUB_ACTIONS_USER_ACCESS_ADMINISTRATOR}
          key_vault_secrets_officer_object_ids   = ${KEY_VAULT_SECRETS_OFFICER_OBJECT_IDS_JSON}
          EOF

      - name: Terraform init
        run: |
          terraform -chdir="${TF_WORKING_DIR}" init -input=false \
            -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TFSTATE_CONTAINER}" \
            -backend-config="key=${TFSTATE_KEY}" \
            -backend-config="access_key=${TFSTATE_ACCESS_KEY}"

      - name: Terraform plan
        run: terraform -chdir="${TF_WORKING_DIR}" plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform -chdir="${TF_WORKING_DIR}" apply -input=false -auto-approve tfplan

      - name: Export Terraform outputs
        run: |
          echo "TF_ACR_LOGIN_SERVER=$(terraform -chdir="${TF_WORKING_DIR}" output -raw acr_login_server)" >> "${GITHUB_ENV}"
          echo "TF_AKS_NAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw aks_name)" >> "${GITHUB_ENV}"
          echo "TF_AKS_NAMESPACE=$(terraform -chdir="${TF_WORKING_DIR}" output -raw aks_namespace)" >> "${GITHUB_ENV}"
          echo "TF_RESOURCE_GROUP_NAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw resource_group_name)" >> "${GITHUB_ENV}"
          echo "TF_KEY_VAULT_NAME=$(terraform -chdir="${TF_WORKING_DIR}" output -raw key_vault_name)" >> "${GITHUB_ENV}"
          echo "TF_AKS_KEYVAULT_CSI_CLIENT_ID=$(terraform -chdir="${TF_WORKING_DIR}" output -raw aks_keyvault_csi_client_id)" >> "${GITHUB_ENV}"

      - name: Validate ACR access
        run: |
          ACR_NAME="${TF_ACR_LOGIN_SERVER%%.azurecr.io}"
          az acr show --name "${ACR_NAME}" --resource-group "${TF_RESOURCE_GROUP_NAME}"
          az acr login --name "${ACR_NAME}"

      - name: Prepare Docker build context
        run: |
          BUILD_CONTEXT="${RUNNER_TEMP}/${{ matrix.service }}-build"
          echo "BUILD_CONTEXT=${BUILD_CONTEXT}" >> "${GITHUB_ENV}"

          case "${{ matrix.service }}" in
            research_agent)
              mkdir -p "${BUILD_CONTEXT}/projects/research_agent"
              cp pyproject.toml "${BUILD_CONTEXT}/pyproject.toml"
              cp -R packages "${BUILD_CONTEXT}/packages"
              cp -R projects/research_agent/app "${BUILD_CONTEXT}/projects/research_agent/app"
              cp projects/research_agent/agent.py "${BUILD_CONTEXT}/projects/research_agent/agent.py"
              cp projects/research_agent/requirements-research-agent.txt "${BUILD_CONTEXT}/projects/research_agent/requirements-research-agent.txt"
              ;;
            rag_system)
              mkdir -p "${BUILD_CONTEXT}/projects/rag_system"
              cp pyproject.toml "${BUILD_CONTEXT}/pyproject.toml"
              cp -R packages "${BUILD_CONTEXT}/packages"
              cp -R projects/rag_system/app "${BUILD_CONTEXT}/projects/rag_system/app"
              cp projects/rag_system/requirements-rag-system.txt "${BUILD_CONTEXT}/projects/rag_system/requirements-rag-system.txt"
              ;;
          esac

      - name: Login Docker to ACR
        run: |
          ACR_NAME="${TF_ACR_LOGIN_SERVER%%.azurecr.io}"
          az acr login --name "${ACR_NAME}"

      - name: Build and push image to ACR
        run: |
          IMAGE_REF="${TF_ACR_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build \
            -f "${GITHUB_WORKSPACE}/${DOCKERFILE}" \
            -t "${IMAGE_REF}" \
            "${BUILD_CONTEXT}"
          docker push "${IMAGE_REF}"

      - name: Set AKS context
        uses: Azure/aks-set-context@v4
        with:
          resource-group: ${{ env.TF_RESOURCE_GROUP_NAME }}
          cluster-name: ${{ env.TF_AKS_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v4.3.0

      - name: Deploy service with Helm
        run: |
          helm upgrade --install "${HELM_RELEASE_NAME}" \
            ./deploy/helm/charts/fastapi-service \
            --namespace "${TF_AKS_NAMESPACE}" \
            --create-namespace \
            -f "./${VALUES_FILE}" \
            --set image.repository="${TF_ACR_LOGIN_SERVER}/${IMAGE_NAME}" \
            --set image.tag="${GITHUB_SHA}" \
            --set ingress.enabled=true \
            --set ingress.host="${SERVICE_HOST}" \
            --set ingress.tls.enabled=true \
            --set ingress.tls.secretName="${SERVICE_TLS_SECRET_NAME}" \
            --set keyVault.enabled=true \
            --set keyVault.name="${TF_KEY_VAULT_NAME}" \
            --set keyVault.tenantId="${{ secrets.AZURE_TENANT_ID }}" \
            --set keyVault.userAssignedIdentityID="${TF_AKS_KEYVAULT_CSI_CLIENT_ID}"
